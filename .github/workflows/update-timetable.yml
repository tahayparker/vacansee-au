name: Update Timetable Data

on:
  schedule:
    # Every hour. The scraper's preload publish-date check is cheap;
    # a full multi-campus scrape only runs when SOLSS data actually changes.
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-timetable:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    concurrency:
      group: update-timetable
      cancel-in-progress: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/requirements.txt

      - name: Validate required secrets
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          for v in SUPABASE_URL SUPABASE_SERVICE_ROLE_KEY; do
            if [ -z "${!v}" ]; then echo "::error::Secret $v not set."; exit 1; fi
          done

      - name: Scrape SOLSS timetable
        run: |
          FORCE=""
          if [ "${{ inputs.force }}" = "true" ]; then
            FORCE="--force"
          fi
          python scripts/scrape_timetable.py

      - name: Detect CSV changes
        id: csv
        run: |
          if git diff --quiet -- public/classes.csv; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No timetable changes — skipping DB upload and commit."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Update Rooms table
        if: steps.csv.outputs.changed == 'true'
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python scripts/update_rooms.py

      - name: Upload timetable to DB
        if: steps.csv.outputs.changed == 'true'
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python scripts/upload_timetable.py

      - name: Generate schedule JSON
        if: steps.csv.outputs.changed == 'true'
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python scripts/generate_schedule.py

      - name: Format scheduleData.json
        if: steps.csv.outputs.changed == 'true'
        run: |
          npm install --no-save prettier
          npx prettier public/scheduleData.json --write

      - name: Commit and push changes
        run: |
          git config user.name "Taha Parker"
          git config user.email "98612931+tahayparker@users.noreply.github.com"

          if [ "${{ steps.csv.outputs.changed }}" = "true" ]; then
            git add public/classes.csv public/scheduleData.json public/raw
            if ! git diff --staged --quiet; then
              git commit -m "Update timetable data [skip deploy]"
              git push
            else
              echo "Nothing to commit."
            fi
          else
            echo "No timetable changes detected."
          fi
